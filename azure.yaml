name: wasm-registry
metadata:
  template: wasm-registry@0.0.1

infra:
  provider: bicep
  path: infra
  module: main

hooks:
  preprovision:
    posix:
      shell: sh
      run: infra/hooks/preprovision.sh
    windows:
      shell: pwsh
      run: infra/hooks/preprovision.ps1
  postprovision:
    posix:
      shell: sh
      run: scripts/bind-custom-domains.sh
    windows:
      shell: pwsh
      run: scripts/bind-custom-domains.ps1
