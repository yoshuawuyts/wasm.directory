name: wasm-registry
metadata:
  template: wasm-registry@0.0.1

infra:
  provider: bicep
  path: infra
  module: main

hooks:
  preprovision:
    posix:
      shell: sh
      run: infra/hooks/preprovision.sh
    windows:
      shell: pwsh
      run: infra/hooks/preprovision.ps1

services:
  backend:
    project: .
    language: docker
    host: containerapp
    docker:
      path: ./Dockerfile.backend
      context: .
      platform: linux/amd64

  frontend:
    project: .
    language: docker
    host: containerapp
    docker:
      path: ./Dockerfile.frontend
      context: .
      platform: linux/amd64
      buildArgs:
        - API_BASE_URL=http://backend
