name: Coverage

on: [push, pull_request]

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@7bfb4f157a6c1a326d8eb1658a802a37c5754539 # cargo-llvm-cov
        with:
          tool: cargo-llvm-cov
      - name: Install sqlite3def
        run: cargo xtask sql install
      - name: Collect coverage data
        run: cargo llvm-cov --workspace --all-features --exclude xtask --no-report
      - name: Generate text summary
        run: cargo llvm-cov report --text 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Generate HTML report
        run: cargo llvm-cov report --html
      - name: Generate lcov report
        run: cargo llvm-cov report --lcov --output-path lcov.info
      - name: Generate Cobertura XML
        run: cargo llvm-cov report --cobertura --output-path coverage.xml
      - name: Generate Markdown coverage summary
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: 'coverage.xml'
          format: 'markdown'
          output: 'both'
          badge: true
      - name: Add Markdown coverage summary to job
        if: hashFiles('code-coverage-results.md') != ''
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"
      - name: Check coverage threshold
        run: cargo llvm-cov report --fail-under-lines 55
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-html
          path: target/llvm-cov/html/
          retention-days: 14
      - name: Upload lcov coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-lcov
          path: lcov.info
          retention-days: 14
