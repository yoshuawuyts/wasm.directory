name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.5.0). Leave blank to auto-increment minor from latest tag."
        required: false
        type: string

permissions:
  contents: read

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            if [[ ! "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version input: '$INPUT_VERSION'. Expected format: X.Y.Z" >&2
              exit 1
            fi
            resolved="$INPUT_VERSION"
          else
            # Find latest X.Y.Z tag, increment minor
            latest=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
            if [ -z "$latest" ]; then
              resolved="0.1.0"
            else
              major=$(echo "$latest" | cut -d. -f1)
              minor=$(echo "$latest" | cut -d. -f2)
              next_minor=$((minor + 1))
              resolved="${major}.${next_minor}.0"
            fi
          fi

          if git ls-remote --tags --exit-code origin "refs/tags/${resolved}" >/dev/null 2>&1; then
            echo "Error: tag '${resolved}' already exists on origin." >&2
            exit 1
          fi

          echo "version=${resolved}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${resolved}"

  build:
    needs: resolve-version
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - runner: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            cross: true
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cross && matrix.target || '' }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set workspace version to ${{ needs.resolve-version.outputs.version }}
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: python scripts/set_workspace_version.py

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Set cross-linker env (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> "$GITHUB_ENV"

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Set sccache env vars
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --package component ${{ matrix.cross && format('--target {0}', matrix.target) || '' }}

      - name: Package binary (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          BIN_DIR=${{ matrix.cross && format('target/{0}/release', matrix.target) || 'target/release' }}
          tar czf component-${{ matrix.target }}.tar.gz -C "$BIN_DIR" component

      - name: Package binary (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/component.exe -DestinationPath component-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: component-${{ matrix.target }}
          path: component-${{ matrix.target }}.${{ matrix.archive }}

  publish-images:
    name: Build and publish container images
    runs-on: ubuntu-latest
    needs: [resolve-version, build]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_BASE: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set workspace version to ${{ needs.resolve-version.outputs.version }}
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: python scripts/set_workspace_version.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64
          push: true
          # Disable provenance attestations: the extra attestation manifest
          # fails to push to a freshly created GHCR package with
          # "denied: permission_denied: write_package".
          provenance: false
          tags: |
            ${{ env.IMAGE_BASE }}/backend:${{ needs.resolve-version.outputs.version }}
            ${{ env.IMAGE_BASE }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/amd64
          push: true
          # Disable provenance attestations: the extra attestation manifest
          # fails to push to a freshly created GHCR package with
          # "denied: permission_denied: write_package".
          provenance: false
          # API_BASE_URL is baked into the Wasm at build time via
          # option_env!("API_BASE_URL"). In Azure Container Apps the backend is
          # reached by its app name on the ingress port (80), which forwards to
          # the container's targetPort (8081). Using http://backend:8081 here
          # does NOT route in ACA and makes the frontend panic (connection
          # reset) on every backend-backed request, so use http://backend.
          build-args: |
            API_BASE_URL=http://backend
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:${{ needs.resolve-version.outputs.version }}
            ${{ env.IMAGE_BASE }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [resolve-version, publish-images]
    permissions:
      contents: read # checkout
      id-token: write # OIDC token for azure/login
      deployments: write # create + update GitHub deployments
    env:
      IMAGE_BASE: ghcr.io/${{ github.repository }}
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      # Record the rollout through the GitHub Deployments API so it shows up in
      # the repo's Environments tab with a live status. No job-level
      # `environment:` is used on purpose: that would auto-create a second,
      # duplicate deployment alongside the ones created here.
      - name: Create GitHub deployment
        id: deployment
        uses: actions/github-script@v9
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: `Release ${process.env.VERSION}`,
              auto_merge: false,
              required_contexts: [],
              production_environment: true,
            });
            if (!('id' in deployment.data)) {
              core.setFailed(`Failed to create deployment: ${deployment.data.message}`);
              return;
            }
            core.setOutput('deployment_id', deployment.data.id);

      - name: Mark deployment in progress
        uses: actions/github-script@v9
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'in_progress',
              description: 'Deploying to Azure Container Apps',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Log in to Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install the Azure Developer CLI (azd)
        uses: Azure/setup-azd@v2

      # Deploy with `azd up`, the same entry point as a manual deploy, so CI and
      # local runs share one path through azure.yaml + infra/main.bicep. azd
      # reuses the az CLI's OIDC session (auth.useAzCliAuth) — the preprovision
      # hook shells out to `az`, so `az` must stay authenticated too. azure.yaml
      # declares no `services:`, so `azd up`'s deploy phase is a no-op: it only
      # provisions the infra, pointing the Container Apps at the images that
      # `publish-images` just pushed (pinned to :$VERSION, never :latest).
      #
      # Registry credentials are configured only when GHCR_PULL_TOKEN is set. The
      # Bicep modules treat any non-empty registryServer as "use a private
      # registry" (useRegistry = !empty(registryServer)), so leaving these unset
      # lets public images deploy without credentials.
      - name: Deploy to Azure Container Apps
        id: azure-deploy
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          CUSTOM_DOMAIN_NAME: ${{ vars.CUSTOM_DOMAIN_NAME }}
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
          BACKEND_IMAGE: ${{ env.IMAGE_BASE }}/backend:${{ env.VERSION }}
          FRONTEND_IMAGE: ${{ env.IMAGE_BASE }}/frontend:${{ env.VERSION }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          REGISTRY_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          # Let azd (and its hooks) reuse the OIDC session from azure/login.
          azd config set auth.useAzCliAuth true

          # Create + select an ephemeral azd environment for this run, then seed
          # the parameters infra/main.bicepparam reads via readEnvironmentVariable.
          azd env new "${AZURE_ENV_NAME}" --no-prompt \
            --subscription "${AZURE_SUBSCRIPTION_ID}" \
            --location "${AZURE_LOCATION}"
          azd env set POSTGRES_ADMIN_PASSWORD "${POSTGRES_ADMIN_PASSWORD}"
          azd env set BACKEND_IMAGE "${BACKEND_IMAGE}"
          azd env set FRONTEND_IMAGE "${FRONTEND_IMAGE}"
          if [ -n "${AZURE_RESOURCE_GROUP:-}" ]; then
            azd env set AZURE_RESOURCE_GROUP "${AZURE_RESOURCE_GROUP}"
          fi
          if [ -n "${CUSTOM_DOMAIN_NAME:-}" ]; then
            azd env set CUSTOM_DOMAIN_NAME "${CUSTOM_DOMAIN_NAME}"
          fi
          if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
            azd env set REGISTRY_SERVER "ghcr.io"
            azd env set REGISTRY_USERNAME "${REGISTRY_ACTOR}"
            azd env set REGISTRY_PASSWORD "${GHCR_PULL_TOKEN}"
          fi

          azd up --no-prompt

          frontend_url="$(azd env get-value SERVICE_FRONTEND_URL 2>/dev/null || true)"
          if [ -z "${frontend_url}" ] || [ "${frontend_url}" = "null" ]; then
            echo "error: azd up did not produce a SERVICE_FRONTEND_URL output" >&2
            exit 1
          fi
          echo "frontend_url=${frontend_url}" >> "$GITHUB_OUTPUT"
          echo "Deployed release ${VERSION}. Frontend URL: ${frontend_url}"

      - name: Mark deployment successful
        if: success()
        uses: actions/github-script@v9
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
          ENVIRONMENT_URL: ${{ steps.azure-deploy.outputs.frontend_url }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'success',
              description: 'Deployed to Azure Container Apps',
              environment_url: process.env.ENVIRONMENT_URL,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Mark deployment failed
        if: failure() && steps.deployment.outputs.deployment_id != ''
        uses: actions/github-script@v9
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'failure',
              description: 'Azure deployment failed',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve-version, build, publish-images]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
            -exec mv {} release-assets/ \;
          cp scripts/install.sh release-assets/install.sh
          cp scripts/install.ps1 release-assets/install.ps1
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: "${{ needs.resolve-version.outputs.version }}"
          generate_release_notes: true
          files: release-assets/*
