name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.5.0). Leave blank to auto-increment minor from latest tag."
        required: false
        type: string

permissions:
  contents: read

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            if [[ ! "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid version input: '$INPUT_VERSION'. Expected format: X.Y.Z" >&2
              exit 1
            fi
            resolved="$INPUT_VERSION"
          else
            # Find latest X.Y.Z tag, increment minor
            latest=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
            if [ -z "$latest" ]; then
              resolved="0.1.0"
            else
              major=$(echo "$latest" | cut -d. -f1)
              minor=$(echo "$latest" | cut -d. -f2)
              next_minor=$((minor + 1))
              resolved="${major}.${next_minor}.0"
            fi
          fi

          if git ls-remote --tags --exit-code origin "refs/tags/${resolved}" >/dev/null 2>&1; then
            echo "Error: tag '${resolved}' already exists on origin." >&2
            exit 1
          fi

          echo "version=${resolved}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${resolved}"

  build:
    needs: resolve-version
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - runner: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            cross: true
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cross && matrix.target || '' }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set workspace version to ${{ needs.resolve-version.outputs.version }}
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: python scripts/set_workspace_version.py

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Set cross-linker env (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> "$GITHUB_ENV"

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Set sccache env vars
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --package component ${{ matrix.cross && format('--target {0}', matrix.target) || '' }}

      - name: Package binary (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          BIN_DIR=${{ matrix.cross && format('target/{0}/release', matrix.target) || 'target/release' }}
          tar czf component-${{ matrix.target }}.tar.gz -C "$BIN_DIR" component

      - name: Package binary (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/component.exe -DestinationPath component-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: component-${{ matrix.target }}
          path: component-${{ matrix.target }}.${{ matrix.archive }}

  publish-images:
    name: Build and publish container images
    runs-on: ubuntu-latest
    needs: [resolve-version, build]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_BASE: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set workspace version to ${{ needs.resolve-version.outputs.version }}
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: python scripts/set_workspace_version.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # Authenticate as the namespace owner so the push targets packages
          # under ${{ github.repository_owner }}.
          username: ${{ github.repository_owner }}
          # The repository-scoped GITHUB_TOKEN cannot create a brand-new GHCR
          # package, so the first publish fails with
          # "denied: permission_denied: write_package". Prefer a PAT with the
          # `write:packages` scope (stored as the GHCR_TOKEN secret) when one is
          # configured, and fall back to GITHUB_TOKEN otherwise.
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64
          push: true
          # Disable provenance attestations: the extra attestation manifest
          # fails to push to a freshly created GHCR package with
          # "denied: permission_denied: write_package".
          provenance: false
          tags: |
            ${{ env.IMAGE_BASE }}/backend:${{ needs.resolve-version.outputs.version }}
            ${{ env.IMAGE_BASE }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/amd64
          push: true
          # Disable provenance attestations: the extra attestation manifest
          # fails to push to a freshly created GHCR package with
          # "denied: permission_denied: write_package".
          provenance: false
          build-args: |
            API_BASE_URL=http://backend:8081
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:${{ needs.resolve-version.outputs.version }}
            ${{ env.IMAGE_BASE }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve-version, build, publish-images]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) \
            -exec mv {} release-assets/ \;
          cp scripts/install.sh release-assets/install.sh
          cp scripts/install.ps1 release-assets/install.ps1
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "${{ needs.resolve-version.outputs.version }}"
          generate_release_notes: true
          files: release-assets/*
