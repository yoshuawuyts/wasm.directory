name: 'Run component CLI'
description: 'Run the component(1) unified WebAssembly developer tool in your GitHub Actions workflow'
author: 'yoshuawuyts'

inputs:
  command:
    description: 'The component subcommand to run (run, install, init, local, registry)'
    required: true
    default: 'run'
  input:
    description: 'For `component run`: local file path or OCI reference to the Wasm Component'
    required: false
    default: ''
  args:
    description: 'Additional arguments passed verbatim to the component command'
    required: false
    default: ''
  offline:
    description: 'Run in offline mode (--offline)'
    required: false
    default: 'false'
  color:
    description: 'When to use colored output: auto, always, or never (--color)'
    required: false
    default: 'auto'
  inherit-env:
    description: 'For `component run`: inherit all host environment variables (--inherit-env)'
    required: false
    default: 'false'
  inherit-network:
    description: 'For `component run`: allow the guest to access the network (--inherit-network)'
    required: false
    default: 'false'
  no-stdio:
    description: 'For `component run`: suppress stdin/stdout/stderr inheritance (--no-stdio)'
    required: false
    default: 'false'

outputs:
  exit-code:
    description: 'Exit code returned by the component command'
    value: ${{ steps.component.outputs.exit-code }}

runs:
  using: composite
  steps:
    - name: Resolve version
      id: version
      shell: bash
      run: |
        ACTION_REF="${{ github.action_ref }}"
        REPO="${{ github.action_repository || 'yoshuawuyts/component-cli' }}"
        if [[ "$ACTION_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "tag=$ACTION_REF" >> "$GITHUB_OUTPUT"
        elif [[ "$ACTION_REF" =~ ^v([0-9]+)$ ]]; then
          # Major version tag (e.g. v0): find the latest release matching this major.
          # The GitHub API returns releases in reverse chronological order, so the
          # first match is the most recent release for this major version.
          MAJOR="${BASH_REMATCH[1]}"
          TAG=$(curl -sf \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases?per_page=100" \
            | MAJOR="$MAJOR" node -e "
              let data = '';
              process.stdin.on('data', chunk => data += chunk);
              process.stdin.on('end', () => {
                try {
                  const releases = JSON.parse(data);
                  const prefix = 'v' + process.env.MAJOR + '.';
                  const match = releases.find(r =>
                    typeof r.tag_name === 'string' && r.tag_name.startsWith(prefix)
                  );
                  if (match) process.stdout.write(match.tag_name);
                } catch (err) {
                  process.stderr.write('Failed to parse releases JSON: ' + err.message + '\n');
                }
              });
            ") || true
          if [ -n "$TAG" ]; then
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Could not resolve latest v${MAJOR}.x release, falling back to cargo install"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
        else
          TAG=$(curl -sf \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases/latest" \
            | node -e "
              let data = '';
              process.stdin.on('data', chunk => data += chunk);
              process.stdin.on('end', () => {
                try {
                  const json = JSON.parse(data);
                  if (typeof json.tag_name === 'string') {
                    process.stdout.write(json.tag_name);
                  }
                } catch (err) {
                  process.stderr.write('Failed to parse release JSON: ' + err.message + '\n');
                }
              });
            ") || true
          if [ -n "$TAG" ]; then
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Could not resolve latest release tag, falling back to cargo install"
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
        fi

    - name: Detect platform
      id: platform
      shell: bash
      run: |
        OS="${{ runner.os }}"
        ARCH="${{ runner.arch }}"
        case "${OS}-${ARCH}" in
          Linux-X64)    TARGET="x86_64-unknown-linux-gnu";     EXT="tar.gz" ;;
          Linux-ARM64)  TARGET="aarch64-unknown-linux-gnu";    EXT="tar.gz" ;;
          macOS-ARM64)  TARGET="aarch64-apple-darwin";         EXT="tar.gz" ;;
          Windows-X64)  TARGET="x86_64-pc-windows-msvc";      EXT="zip"    ;;
          *)
            echo "::warning::Unsupported platform ${OS}-${ARCH}, falling back to cargo install"
            echo "target=" >> "$GITHUB_OUTPUT"
            exit 0
            ;;
        esac
        echo "target=$TARGET" >> "$GITHUB_OUTPUT"
        echo "ext=$EXT" >> "$GITHUB_OUTPUT"

    - name: Cache component CLI binary
      if: steps.version.outputs.tag != '' && steps.platform.outputs.target != ''
      id: cache
      uses: actions/cache@v6
      with:
        path: ${{ runner.tool_cache }}/component-cli
        key: component-cli-${{ steps.version.outputs.tag }}-${{ runner.os }}-${{ runner.arch }}

    - name: Download pre-built binary
      id: download
      if: >-
        steps.version.outputs.tag != '' &&
        steps.platform.outputs.target != '' &&
        steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        TARGET="${{ steps.platform.outputs.target }}"
        EXT="${{ steps.platform.outputs.ext }}"
        REPO="${{ github.action_repository || 'yoshuawuyts/component-cli' }}"
        URL="https://github.com/${REPO}/releases/download/${TAG}/component-${TARGET}.${EXT}"
        DEST="${{ runner.tool_cache }}/component-cli"
        mkdir -p "$DEST"
        echo "Downloading $URL"
        if [[ "$EXT" == "tar.gz" ]]; then
          if ! curl -fsSL "$URL" | tar xz -C "$DEST"; then
            echo "::warning::Failed to download pre-built binary from $URL"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        else
          if ! curl -fsSL "$URL" -o /tmp/component.zip; then
            echo "::warning::Failed to download pre-built binary from $URL"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! unzip -o /tmp/component.zip -d "$DEST"; then
            echo "::warning::Failed to extract pre-built binary archive"
            rm -f /tmp/component.zip
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          rm -f /tmp/component.zip
        fi
        if [ -f "$DEST/component" ]; then
          chmod +x "$DEST/component"
        fi
        echo "ok=true" >> "$GITHUB_OUTPUT"

    - name: Add binary to PATH
      if: >-
        steps.version.outputs.tag != '' &&
        steps.platform.outputs.target != '' &&
        (steps.cache.outputs.cache-hit == 'true' || steps.download.outputs.ok == 'true')
      shell: bash
      run: echo "${{ runner.tool_cache }}/component-cli" >> "$GITHUB_PATH"

    - name: Fallback to cargo install
      shell: bash
      run: |
        if ! command -v component &>/dev/null; then
          REPO="${{ github.action_repository || 'yoshuawuyts/component-cli' }}"
          cargo install --git "https://github.com/${REPO}.git" component
        fi

    - name: Verify component is available
      shell: bash
      run: component --help > /dev/null

    - name: Run component
      id: component
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_INPUT: ${{ inputs.input }}
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_OFFLINE: ${{ inputs.offline }}
        INPUT_COLOR: ${{ inputs.color }}
        INPUT_INHERIT_ENV: ${{ inputs.inherit-env }}
        INPUT_INHERIT_NETWORK: ${{ inputs.inherit-network }}
        INPUT_NO_STDIO: ${{ inputs.no-stdio }}
      run: |
        args=()

        # Global options
        [ "$INPUT_OFFLINE" = "true" ] && args+=(--offline)
        [ "$INPUT_COLOR" != "auto" ] && args+=(--color "$INPUT_COLOR")

        # Subcommand
        args+=("$INPUT_COMMAND")

        # Positional input argument (e.g. file path or OCI reference for `component run`)
        [ -n "$INPUT_INPUT" ] && args+=("$INPUT_INPUT")

        # Flags for `component run`
        [ "$INPUT_INHERIT_ENV" = "true" ] && args+=(--inherit-env)
        [ "$INPUT_INHERIT_NETWORK" = "true" ] && args+=(--inherit-network)
        [ "$INPUT_NO_STDIO" = "true" ] && args+=(--no-stdio)

        # Additional verbatim arguments split on whitespace
        if [ -n "$INPUT_ARGS" ]; then
          read -ra extra_args <<< "$INPUT_ARGS"
          args+=("${extra_args[@]}")
        fi

        set +e
        component "${args[@]}"
        exit_code=$?
        set -e
        echo "exit-code=$exit_code" >> "$GITHUB_OUTPUT"
        exit $exit_code
